<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS.gg -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/css.gg/icons/icons.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">

</head>

<body>

    <!-- ---HEADER--- -->
    <header class="main-header fixed-top">
        <div class="container">
            <nav class="navbar navbar-expand-lg header-navbar">
                <!-- Logo -->
                <h1 class="mb-0">
                    <a class="navbar-brand" href="index.html">
                        <span class="fa-solid fa-handshake"></span>
                        Masterwork
                    </a>
                </h1>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Nav items -->
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Services</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                Pages
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Blog Posts</a></li>
                                <li><a class="dropdown-item" href="#">Landing page</a></li>
                                <li><a class="dropdown-item" href="#">404 page</a></li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Contact</a>
                        </li>
                    </ul>

                    <!-- Search -->
                    <div class="search">
                        <a href="#">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </a>
                    </div>

                    <!-- Buy Button -->
                    <div class="header-button">
                        <a href="#" class="btn btn-outline-primary theme-button">Schedule a Demo</a>
                    </div>
                </div>

                <!-- Theme Toggle -->
                <div class="theme-toggle">
                    <label class="theme-label" for="theme-switch">
                        <input type="checkbox" id="theme-switch">

                        <div class="theme-icons">
                            <i class="gg-sun"></i>
                            <i class="gg-moon"></i>
                        </div>
                    </label>
                </div>
            </nav>
        </div>

    </header>

    <!-- ---HERO--- -->
    <section class="hero">
        <div class="hero-content">
            <div class="container">
                <div class="row align-items-center">
                    <!-- Left Items -->
                    <div class="col-lg-6 hero-left content-left">
                        <h1>We Execute Our Ideas From Start to Finish</h1>

                        <p>Building a beautiful interactive business for startups and innovative companies.</p>

                        <a href="#" class="btn btn-outline-primary theme-button">
                            Get Started
                        </a>
                    </div>

                    <!-- Right Items -->
                    <div class="col-lg-6 hero-right content-photo">

                        <img src="./img/main.png" alt="Hero Image" class="img-fluid">

                    </div>
                </div>
            </div>
        </div>
    </section>






































    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="./js/main.js"></script>
